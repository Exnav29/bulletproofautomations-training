name: Daily Waitlist Digest

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Call Supabase daily digest function
        run: |
          curl -f --retry 3 --retry-delay 30 -X POST "$SUPABASE_DAILY_DIGEST_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -d '{}'
        env:
          SUPABASE_DAILY_DIGEST_URL: ${{ secrets.SUPABASE_DAILY_DIGEST_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Verify Resend delivery
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -fsS "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            | jq -r '.data[] | select(.subject | startswith("Daily training digest:")) | "RESEND_EMAIL_ID=\(.id)\nRESEND_MESSAGE_ID=\(.message_id)\nRESEND_STATUS=\(.last_event)\nRESEND_CREATED_AT=\(.created_at)"' \
            | head -n 4
      - name: Open failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "Daily digest failed on $(date -u +%F)" \
            --body "Daily digest workflow failed: $RUN_URL"
